# ── paper-time Local Development (production-flavor) ────────
# Start: docker compose up
# Backend → :8000, Frontend → :3000.
# Cached MP4s + SQLite DB persist across restarts via the
# papertime_data named volume; the seed is copied from the
# baked image on first start by backend/docker-entrypoint.sh.
# Env vars: copy .env.example → .env at repo root and fill in
# DEDALUS_API_KEY before `docker compose up`.
# For dev hot-reload, layer compose.dev.yml on top:
#   docker compose -f docker-compose.yml -f compose.dev.yml up
# ───────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: papertime-backend:dev
    container_name: papertime-backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
    environment:
      RENDER_MODE: local
      STORAGE_MODE: local
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      PORT: "8000"
      ENVIRONMENT: development
    volumes:
      - papertime_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    image: papertime-frontend:dev
    container_name: papertime-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  papertime_data:
    name: papertime-data
